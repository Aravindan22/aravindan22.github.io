<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FastAPI Interview Q&A — Senior SWE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080810;
    --bg2: #0d0d1a;
    --bg3: #111120;
    --border: #1e1e35;
    --border2: #252540;
    --text: #c8d0e8;
    --text2: #6b7499;
    --text3: #3d4268;
    --accent: #5eead4;
    --accent2: #f97316;
    --accent3: #a78bfa;
    --accent4: #34d399;
    --accent5: #fb923c;
    --accent6: #60a5fa;
    --accent7: #f472b6;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,16,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; gap: 16px;
  }
  .logo {
    font-family: var(--display);
    font-size: 16px; font-weight: 800;
    color: #fff; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .header-meta { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; flex-shrink: 0; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .progress-bar { width: 100px; height: 3px; background: var(--border2); border-radius: 2px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 11px; color: var(--accent); white-space: nowrap; }
  .search-box {
    flex: 1; max-width: 340px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 6px; padding: 6px 12px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
  }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }

  /* LAYOUT */
  .layout { max-width: 1200px; margin: 0 auto; display: flex; }

  /* SIDEBAR */
  nav {
    width: 210px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 20px 0; position: sticky; top: 56px;
    height: calc(100vh - 56px); overflow-y: auto;
  }
  .nav-label {
    font-size: 9px; letter-spacing: 0.2em; color: var(--text3);
    padding: 0 16px 8px; text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 16px; cursor: pointer; border: none;
    background: transparent; width: 100%; text-align: left;
    border-left: 2px solid transparent;
    transition: all 0.15s; font-family: var(--mono);
    color: var(--text3); font-size: 12px;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .nav-item.active { color: #fff; border-left-color: var(--cat-color, var(--accent)); background: rgba(255,255,255,0.03); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cat-color, #555); flex-shrink: 0; }
  .nav-count { margin-left: auto; font-size: 10px; color: var(--text3); }

  /* MAIN */
  main { flex: 1; padding: 24px 28px; min-width: 0; }
  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--display);
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .section-count { font-size: 11px; color: var(--text3); }

  /* QUESTION CARD */
  .q-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    background: var(--bg2);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .q-card:hover { border-color: var(--border2); }
  .q-card.done { border-color: var(--cat-color-alpha, rgba(94,234,212,0.25)); background: rgba(94,234,212,0.03); }

  .q-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; cursor: pointer; user-select: none;
  }
  .q-num { font-size: 10px; color: var(--text3); flex-shrink: 0; margin-top: 2px; width: 22px; }
  .q-check {
    width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; margin-top: 1px;
    border: 1px solid var(--border2); background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; transition: all 0.15s; color: transparent;
  }
  .q-card.done .q-check { background: rgba(94,234,212,0.15); border-color: var(--accent); color: var(--accent); }
  .q-text { flex: 1; font-size: 13px; line-height: 1.65; color: var(--text); }
  .q-card.done .q-text { color: var(--text2); text-decoration: line-through; }
  .q-chevron { flex-shrink: 0; font-size: 11px; color: var(--text3); margin-top: 3px; transition: transform 0.2s; }
  .q-card.open .q-chevron { transform: rotate(180deg); }

  /* TAGS */
  .q-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 10px; padding: 2px 7px; border-radius: 3px;
    border: 1px solid; letter-spacing: 0.04em; cursor: pointer;
    transition: opacity 0.15s;
  }
  .tag:hover { opacity: 0.7; }

  /* ANSWER */
  .q-answer {
    display: none; padding: 0 16px 16px 52px;
    border-top: 1px solid var(--border);
    animation: slideDown 0.2s ease;
  }
  .q-card.open .q-answer { display: block; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .answer-label {
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin: 14px 0 8px;
  }
  .answer-body {
    font-size: 13px; line-height: 1.75; color: #a8b4d0;
  }
  .answer-body p { margin-bottom: 10px; }
  .answer-body p:last-child { margin-bottom: 0; }
  .answer-body code {
    background: #0a0a18; border: 1px solid var(--border2);
    border-radius: 4px; padding: 2px 6px;
    font-family: var(--mono); font-size: 11.5px; color: var(--accent3);
  }
  .answer-body pre {
    background: #07070f; border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px; margin: 10px 0;
    overflow-x: auto; font-size: 12px; color: #8b9ec8;
    line-height: 1.6;
  }
  .answer-body pre .kw { color: #a78bfa; }
  .answer-body pre .fn { color: #5eead4; }
  .answer-body pre .str { color: #86efac; }
  .answer-body pre .cm { color: #3d4268; }
  .answer-body ul { padding-left: 18px; margin-bottom: 10px; }
  .answer-body li { margin-bottom: 5px; color: #a8b4d0; }
  .answer-body strong { color: #dde3f5; font-weight: 600; }
  .tip-box {
    background: rgba(94,234,212,0.05); border: 1px solid rgba(94,234,212,0.15);
    border-radius: 6px; padding: 10px 14px; margin-top: 10px; font-size: 12px;
    color: #7ed8cc;
  }
  .tip-box::before { content: "💡 "; }
  .warn-box {
    background: rgba(249,115,22,0.05); border: 1px solid rgba(249,115,22,0.2);
    border-radius: 6px; padding: 10px 14px; margin-top: 10px; font-size: 12px;
    color: #fb923c;
  }
  .warn-box::before { content: "⚠ "; }

  /* FILTER RESULTS */
  #filter-view { display: none; }
  #filter-view.active { display: block; }
  .filter-info { font-size: 11px; color: var(--text3); margin-bottom: 16px; }
  .filter-cat-label {
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    margin: 14px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }

  /* SCROLLTOP */
  #scrolltop {
    position: fixed; bottom: 24px; right: 24px;
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text2); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #scrolltop.show { opacity: 1; pointer-events: auto; }

  @media (max-width: 768px) {
    nav { display: none; }
    main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-dot"></div>FastAPI Q&A</div>
    <input class="search-box" type="text" placeholder="Search questions..." id="searchInput" oninput="handleSearch(this.value)"/>
    <div class="header-meta">All Levels · 120 Questions</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0/120</div>
    </div>
  </div>
</header>

<div class="layout">
<nav id="sidebar">
  <div class="nav-label">Categories</div>
</nav>
<main id="mainContent">
  <div id="filter-view">
    <div class="filter-info" id="filterInfo"></div>
    <div id="filterResults"></div>
  </div>
</main>
</div>
<button id="scrolltop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const CATEGORIES = [
  { id: "basics", label: "Basics", color: "#fde68a", qs: [
    {
      q: "What is FastAPI and what makes it different from other Python web frameworks?",
      tags: ["basics","intro"],
      a: `<p>FastAPI is a modern, high-performance Python web framework for building APIs. It is built on top of <strong>Starlette</strong> (for ASGI/async) and <strong>Pydantic</strong> (for data validation).</p>
<p><strong>Key differences from Flask/Django:</strong></p>
<ul>
<li>Native <code>async/await</code> support (ASGI-based, not WSGI)</li>
<li>Automatic request validation using Python type hints</li>
<li>Auto-generated OpenAPI docs (Swagger UI + ReDoc) out of the box</li>
<li>One of the fastest Python frameworks — comparable to NodeJS and Go in benchmarks</li>
<li>Built-in dependency injection system</li>
</ul>
<div class="tip-box">FastAPI doesn't replace Django for full-stack apps — it's laser-focused on building APIs fast and correctly.</div>`
    },
    {
      q: "How do you install FastAPI and run your first app?",
      tags: ["basics","setup"],
      a: `<pre><span class="cm"># Install FastAPI and ASGI server</span>
pip install fastapi uvicorn

<span class="cm"># main.py</span>
<span class="kw">from</span> fastapi <span class="kw">import</span> FastAPI

app = FastAPI()

<span class="kw">@app</span>.get(<span class="str">"/"</span>)
<span class="kw">def</span> <span class="fn">root</span>():
    <span class="kw">return</span> {<span class="str">"message"</span>: <span class="str">"Hello, World!"</span>}

<span class="cm"># Run the server</span>
uvicorn main:app --reload</pre>
<p><code>--reload</code> enables hot-reloading during development. Visit <code>http://127.0.0.1:8000/docs</code> to see the auto-generated Swagger UI.</p>`
    },
    {
      q: "What is a path operation and how do you define one in FastAPI?",
      tags: ["basics","routing"],
      a: `<p>A <strong>path operation</strong> is a function that handles a specific HTTP method + URL path combination. You define them using decorators.</p>
<pre><span class="kw">@app</span>.get(<span class="str">"/items"</span>)        <span class="cm"># GET /items</span>
<span class="kw">@app</span>.post(<span class="str">"/items"</span>)       <span class="cm"># POST /items</span>
<span class="kw">@app</span>.put(<span class="str">"/items/{id}"</span>)   <span class="cm"># PUT /items/42</span>
<span class="kw">@app</span>.delete(<span class="str">"/items/{id}"</span>) <span class="cm"># DELETE /items/42</span>
<span class="kw">@app</span>.patch(<span class="str">"/items/{id}"</span>)  <span class="cm"># PATCH /items/42</span>

<span class="kw">@app</span>.get(<span class="str">"/items/{item_id}"</span>)
<span class="kw">def</span> <span class="fn">read_item</span>(item_id: int):
    <span class="kw">return</span> {<span class="str">"id"</span>: item_id}</pre>
<div class="tip-box">FastAPI reads the function return value and converts it to JSON automatically using jsonable_encoder.</div>`
    },
    {
      q: "What are path parameters and how do you declare them?",
      tags: ["basics","routing"],
      a: `<p>Path parameters are variable parts of the URL path, declared inside <code>{curly braces}</code> in the route and as function arguments.</p>
<pre><span class="kw">@app</span>.get(<span class="str">"/users/{user_id}"</span>)
<span class="kw">def</span> <span class="fn">get_user</span>(user_id: int):   <span class="cm"># int type → auto-validated</span>
    <span class="kw">return</span> {<span class="str">"user_id"</span>: user_id}

<span class="cm"># With Enum for fixed values</span>
<span class="kw">from</span> enum <span class="kw">import</span> Enum
<span class="kw">class</span> <span class="fn">ModelName</span>(str, Enum):
    alexnet = <span class="str">"alexnet"</span>
    resnet = <span class="str">"resnet"</span>

<span class="kw">@app</span>.get(<span class="str">"/models/{model}"</span>)
<span class="kw">def</span> <span class="fn">get_model</span>(model: ModelName):
    <span class="kw">return</span> {<span class="str">"model"</span>: model}</pre>
<p>If the type is <code>int</code> and the client sends a string, FastAPI returns a 422 validation error automatically.</p>`
    },
    {
      q: "What are query parameters and how are they different from path parameters?",
      tags: ["basics","routing"],
      a: `<p>Query parameters appear after the <code>?</code> in the URL (e.g. <code>/items?skip=0&limit=10</code>). In FastAPI, any function argument not in the path is treated as a query parameter.</p>
<pre><span class="kw">@app</span>.get(<span class="str">"/items"</span>)
<span class="kw">def</span> <span class="fn">list_items</span>(skip: int = 0, limit: int = 10, q: str | <span class="kw">None</span> = <span class="kw">None</span>):
    <span class="kw">return</span> {<span class="str">"skip"</span>: skip, <span class="str">"limit"</span>: limit, <span class="str">"q"</span>: q}

<span class="cm"># GET /items?skip=5&limit=20&q=shoe</span></pre>
<p><strong>Difference:</strong> path params are required and part of the URL structure; query params are optional by default and come after <code>?</code>.</p>`
    },
    {
      q: "How do you define a request body in FastAPI?",
      tags: ["basics","pydantic"],
      a: `<p>Declare a Pydantic model and use it as a parameter type. FastAPI reads it from the request body (JSON).</p>
<pre><span class="kw">from</span> pydantic <span class="kw">import</span> BaseModel

<span class="kw">class</span> <span class="fn">Item</span>(BaseModel):
    name: str
    price: float
    is_offer: bool = <span class="kw">False</span>   <span class="cm"># optional with default</span>

<span class="kw">@app</span>.post(<span class="str">"/items"</span>)
<span class="kw">def</span> <span class="fn">create_item</span>(item: Item):
    <span class="kw">return</span> item</pre>
<p>FastAPI automatically validates the JSON, converts types, and generates the request schema in OpenAPI docs. On validation failure, a 422 response is returned with field-level error details.</p>`
    },
    {
      q: "What is Pydantic and why does FastAPI use it?",
      tags: ["basics","pydantic"],
      a: `<p>Pydantic is a Python data validation library that uses type annotations to define and validate data structures. FastAPI uses it because:</p>
<ul>
<li>Validates and parses request data automatically</li>
<li>Provides clear error messages with field-level detail</li>
<li>Generates JSON Schema for OpenAPI documentation</li>
<li>Converts data types (e.g. string <code>"42"</code> → int <code>42</code>)</li>
<li>Pydantic v2 is extremely fast (Rust-based core)</li>
</ul>
<pre><span class="kw">from</span> pydantic <span class="kw">import</span> BaseModel, Field, EmailStr

<span class="kw">class</span> <span class="fn">User</span>(BaseModel):
    name: str = Field(min_length=2, max_length=50)
    email: EmailStr
    age: int = Field(ge=0, le=150)</pre>`
    },
    {
      q: "How do you return different HTTP status codes in FastAPI?",
      tags: ["basics","http"],
      a: `<pre><span class="cm"># Default status code in decorator</span>
<span class="kw">@app</span>.post(<span class="str">"/items"</span>, status_code=201)
<span class="kw">def</span> <span class="fn">create_item</span>(item: Item):
    <span class="kw">return</span> item

<span class="cm"># Use HTTP status constants for readability</span>
<span class="kw">from</span> fastapi <span class="kw">import</span> status

<span class="kw">@app</span>.delete(<span class="str">"/items/{id}"</span>, status_code=status.HTTP_204_NO_CONTENT)
<span class="kw">def</span> <span class="fn">delete_item</span>(id: int):
    <span class="kw">return None</span></pre>
<p>Common codes: 200 (OK), 201 (Created), 204 (No Content), 400 (Bad Request), 401 (Unauthorized), 403 (Forbidden), 404 (Not Found), 422 (Validation Error), 500 (Server Error).</p>`
    },
    {
      q: "How do you raise HTTP errors in FastAPI?",
      tags: ["basics","error-handling"],
      a: `<pre><span class="kw">from</span> fastapi <span class="kw">import</span> HTTPException

<span class="kw">@app</span>.get(<span class="str">"/items/{item_id}"</span>)
<span class="kw">def</span> <span class="fn">get_item</span>(item_id: int):
    item = db.get(item_id)
    <span class="kw">if not</span> item:
        <span class="kw">raise</span> HTTPException(
            status_code=404,
            detail=<span class="str">"Item not found"</span>
        )
    <span class="kw">return</span> item

<span class="cm"># With custom headers</span>
<span class="kw">raise</span> HTTPException(
    status_code=403,
    detail=<span class="str">"Access denied"</span>,
    headers={<span class="str">"X-Error"</span>: <span class="str">"insufficient-permissions"</span>}
)</pre>
<div class="tip-box">HTTPException is the standard way to return error responses. The detail field can be any JSON-serializable value — a string, dict, or list.</div>`
    },
    {
      q: "What is the purpose of `response_model` in FastAPI?",
      tags: ["basics","response"],
      a: `<p><code>response_model</code> controls what data is returned to the client. It filters the output through a Pydantic model, stripping any fields not defined in it — useful for hiding internal fields like passwords.</p>
<pre><span class="kw">class</span> <span class="fn">UserIn</span>(BaseModel):
    username: str; password: str

<span class="kw">class</span> <span class="fn">UserOut</span>(BaseModel):
    username: str           <span class="cm"># no password field</span>

<span class="kw">@app</span>.post(<span class="str">"/users"</span>, response_model=UserOut)
<span class="kw">def</span> <span class="fn">create_user</span>(user: UserIn):
    return user  <span class="cm"># password is stripped from response</span></pre>
<div class="warn-box">Always use response_model when returning DB models that contain sensitive fields — don't rely on "not using" the field in your return value.</div>`
    },
    {
      q: "How do you add metadata like title, description, and version to a FastAPI app?",
      tags: ["basics","openapi"],
      a: `<pre>app = FastAPI(
    title=<span class="str">"My Awesome API"</span>,
    description=<span class="str">"""
## My API

This API does **amazing things**.
    """</span>,
    version=<span class="str">"1.0.0"</span>,
    contact={
        <span class="str">"name"</span>: <span class="str">"Dev Team"</span>,
        <span class="str">"email"</span>: <span class="str">"dev@example.com"</span>
    },
    license_info={<span class="str">"name"</span>: <span class="str">"MIT"</span>},
    docs_url=<span class="str">"/docs"</span>,
    redoc_url=<span class="str">"/redoc"</span>
)</pre>
<p>The description supports Markdown. This metadata appears in the Swagger UI header and in the OpenAPI JSON spec.</p>`
    },
    {
      q: "What is a Pydantic `Field` and how do you use it for validation?",
      tags: ["basics","pydantic"],
      a: `<p><code>Field</code> adds extra validation rules and metadata to Pydantic model fields.</p>
<pre><span class="kw">from</span> pydantic <span class="kw">import</span> BaseModel, Field

<span class="kw">class</span> <span class="fn">Product</span>(BaseModel):
    name: str = Field(
        min_length=1,
        max_length=100,
        description=<span class="str">"Product name"</span>,
        example=<span class="str">"Laptop"</span>
    )
    price: float = Field(gt=0, description=<span class="str">"Must be positive"</span>)
    quantity: int = Field(ge=0, le=1000, default=0)
    sku: str = Field(pattern=<span class="str">r"^[A-Z]{2}\d{4}$"</span>)</pre>
<p>Common validators: <code>gt</code> (greater than), <code>ge</code> (≥), <code>lt</code> (less than), <code>le</code> (≤), <code>min_length</code>, <code>max_length</code>, <code>pattern</code>.</p>`
    },
    {
      q: "How do you use query parameters with validation in FastAPI?",
      tags: ["basics","validation"],
      a: `<pre><span class="kw">from</span> fastapi <span class="kw">import</span> Query

<span class="kw">@app</span>.get(<span class="str">"/search"</span>)
<span class="kw">def</span> <span class="fn">search</span>(
    q: str = Query(min_length=3, max_length=50),
    limit: int = Query(default=10, ge=1, le=100),
    tags: list[str] = Query(default=[])
):
    <span class="kw">return</span> {<span class="str">"q"</span>: q, <span class="str">"limit"</span>: limit, <span class="str">"tags"</span>: tags}

<span class="cm"># GET /search?q=shoe&tags=red&tags=blue</span>
<span class="cm"># tags = ["red", "blue"]  — multi-value query params</span></pre>
<div class="tip-box">Use <code>Query(...)</code> with <code>...</code> (Ellipsis) as the default to make a query parameter required with no default value.</div>`

// Build global lookup for checkboxes
let allQuestions = [];
CATEGORIES.forEach((cat, ci) => {
  cat.qs.forEach((q, qi) => {
    allQuestions.push({ ...q, catId: cat.id, catLabel: cat.label, color: cat.color, key: `${cat.id}-${qi}` });
  });
});

// State
let activeCategory = "basics";
let completed = {};
let searchQuery = "";

function init() {
  buildSidebar();
  buildSections();
  renderActive();
  updateProgress();
  window.addEventListener("scroll", () => {
    document.getElementById("scrolltop").classList.toggle("show", window.scrollY > 300);
  });
}

function buildSidebar() {
  const nav = document.getElementById("sidebar");
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "nav-item";
    btn.dataset.id = cat.id;
    btn.style.setProperty("--cat-color", cat.color);
    btn.innerHTML = `<span class="nav-dot" style="background:${cat.color}"></span>
      <span>${cat.label}</span>
      <span class="nav-count">${cat.qs.length}</span>`;
    btn.onclick = () => { activeCategory = cat.id; renderActive(); document.getElementById("searchInput").value = ""; searchQuery = ""; };
    nav.appendChild(btn);
  });
}

function buildSections() {
  const main = document.getElementById("mainContent");
  CATEGORIES.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";
    section.id = `sec-${cat.id}`;
    section.innerHTML = `<div class="section-header">
      <div style="width:10px;height:10px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
      <div class="section-title">${cat.label}</div>
      <div class="section-count">${cat.qs.length} questions</div>
    </div>
    <div id="qlist-${cat.id}"></div>`;
    main.appendChild(section);

    const qlist = section.querySelector(`#qlist-${cat.id}`);
    cat.qs.forEach((q, qi) => {
      qlist.appendChild(buildCard(q, qi, cat));
    });
  });
}

function buildCard(q, qi, cat, globalIdx) {
  const key = `${cat.id}-${qi}`;
  const card = document.createElement("div");
  card.className = "q-card";
  card.id = `card-${key}`;
  card.style.setProperty("--cat-color-alpha", cat.color + "30");
  if (completed[key]) card.classList.add("done");

  const tagHtml = q.tags.map(t =>
    `<span class="tag" style="color:${cat.color};border-color:${cat.color}40;background:${cat.color}12" onclick="filterByTag('${t}');event.stopPropagation()">#${t}</span>`
  ).join("");

  card.innerHTML = `<div class="q-header" onclick="toggleCard('${key}')">
    <div class="q-num">${String(qi + 1).padStart(2, "0")}</div>
    <div class="q-check" onclick="toggleDone('${key}',event)" style="border-color:${completed[key] ? cat.color : ''};background:${completed[key] ? cat.color+'20':''}; color:${completed[key]?cat.color:'transparent'}">${completed[key]?'✓':''}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-chevron">▼</div>
  </div>
  <div class="q-answer">
    <div class="answer-label">Answer</div>
    <div class="answer-body">${q.a}</div>
    <div class="q-tags" style="margin-top:12px">${tagHtml}</div>
  </div>`;

  return card;
}

function toggleCard(key) {
  const card = document.getElementById(`card-${key}`);
  if (!card) return;
  card.classList.toggle("open");
}

function toggleDone(key, e) {
  e.stopPropagation();
  completed[key] = !completed[key];
  const card = document.getElementById(`card-${key}`);
  if (!card) return;
  card.classList.toggle("done", completed[key]);
  // Update check appearance
  const check = card.querySelector(".q-check");
  const qObj = allQuestions.find(q => q.key === key);
  const color = qObj ? qObj.color : "#5eead4";
  if (completed[key]) {
    check.style.borderColor = color;
    check.style.background = color + "20";
    check.style.color = color;
    check.textContent = "✓";
  } else {
    check.style.borderColor = "";
    check.style.background = "";
    check.style.color = "transparent";
    check.textContent = "";
  }
  updateProgress();
}

function renderActive() {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
  const sec = document.getElementById(`sec-${activeCategory}`);
  if (sec) sec.classList.add("active");
  const navBtn = document.querySelector(`.nav-item[data-id="${activeCategory}"]`);
  if (navBtn) navBtn.classList.add("active");
  document.getElementById("filter-view").classList.remove("active");
}

function updateProgress() {
  const total = allQuestions.length;
  const done = Object.values(completed).filter(Boolean).length;
  document.getElementById("progressLabel").textContent = `${done}/${total}`;
  document.getElementById("progressFill").style.width = `${(done / total) * 100}%`;
}

function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  if (!searchQuery) {
    document.getElementById("filter-view").classList.remove("active");
    renderActive();
    return;
  }
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  const fv = document.getElementById("filter-view");
  fv.classList.add("active");
  const results = allQuestions.filter(q =>
    q.q.toLowerCase().includes(searchQuery) ||
    q.tags.some(t => t.includes(searchQuery))
  );
  document.getElementById("filterInfo").textContent = `${results.length} result${results.length !== 1 ? "s" : ""} for "${val}"`;
  const fr = document.getElementById("filterResults");
  fr.innerHTML = "";
  // Group by category
  const grouped = {};
  results.forEach(q => {
    if (!grouped[q.catId]) grouped[q.catId] = { label: q.catLabel, color: q.color, questions: [] };
    grouped[q.catId].questions.push(q);
  });
  Object.entries(grouped).forEach(([catId, group]) => {
    const label = document.createElement("div");
    label.className = "filter-cat-label";
    label.style.color = group.color;
    label.textContent = group.label;
    fr.appendChild(label);
    group.questions.forEach(q => {
      const cat = CATEGORIES.find(c => c.id === catId);
      const qi = cat.qs.indexOf(q);
      fr.appendChild(buildCard(q, qi, cat));
    });
  });
  if (results.length === 0) {
    fr.innerHTML = `<div style="text-align:center;padding:60px 0;color:var(--text3)">No questions match your search.</div>`;
  }
}

function filterByTag(tag) {
  document.getElementById("searchInput").value = tag;
  handleSearch(tag);
}

window.toggleCard = toggleCard;
window.toggleDone = toggleDone;
window.handleSearch = handleSearch;
window.filterByTag = filterByTag;

init();
</script>
